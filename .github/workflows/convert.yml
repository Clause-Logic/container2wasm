name: Convert container to WASM

on:
  workflow_dispatch:
    inputs:
      image:
        description: 'Container image to convert (e.g. alpine:latest)'
        required: true
        default: 'alpine:latest'
      target_arch:
        description: 'Target architecture'
        required: false
        default: 'amd64'
        type: choice
        options: [amd64, riscv64, aarch64]

env:
  CACHE_REF: ghcr.io/clause-logic/c2w-cache

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build c2w
        run: go build -o /usr/local/bin/c2w ./cmd/c2w/

      - name: Convert ${{ inputs.image }} to WASM
        run: |
          mkdir -p /tmp/out
          c2w \
            --target-arch ${{ inputs.target_arch }} \
            --cache-from type=registry,ref=${{ env.CACHE_REF }} \
            ${{ inputs.image }} \
            /tmp/out/out.wasm
          # Sanitize image name for artifact (replace : and / with -)
          echo "ARTIFACT_NAME=$(echo '${{ inputs.image }}' | tr ':/' '--')-${{ inputs.target_arch }}" >> $GITHUB_ENV

      - name: Install wasmtime
        run: curl -sSf https://wasmtime.dev/install.sh | bash && echo "$HOME/.wasmtime/bin" >> $GITHUB_PATH

      - name: Smoke test — run echo in the WASM
        run: |
          WASMTIME_BACKTRACE_DETAILS=1 wasmtime /tmp/out/out.wasm echo hello-from-wasm || true
          echo "exit: $?"

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: /tmp/out/out.wasm
          retention-days: 7
